<svg width="100%" viewBox="0 0 680 520" role="img" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
<title>afs-vision MCP server wireframe</title>
<desc>A layered design for an AFS Vision MCP: an agent client on top; the afs-vision MCP server exposing read-only resource catalogs plus four tool groups (reference/codes, reads, origination writes, servicing writes); a transport and auth layer; and the AFS Vision REST API at the base.</desc>
<defs>
<marker id="ah" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#64748B"/></marker>
</defs>

<!-- Agent -->
<rect x="250" y="40" width="180" height="34" rx="6" fill="#F1F5F9" stroke="#64748B" stroke-width="1.3"/>
<text x="340" y="61" text-anchor="middle" font-size="12.5" font-weight="700" fill="#334155">Agent · MCP client</text>
<line x1="340" y1="74" x2="340" y2="89" stroke="#64748B" stroke-width="1.5" marker-end="url(#ah)"/>

<!-- MCP container -->
<rect x="40" y="90" width="560" height="284" rx="8" fill="none" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="4 3"/>
<text x="52" y="108" font-size="12.5" font-weight="700" fill="#475569">afs-vision MCP server</text>

<!-- Resources (blue) -->
<rect x="52" y="118" width="255" height="116" rx="6" fill="#E6F1FB" stroke="#2563EB" stroke-width="1.3"/>
<text x="64" y="137" font-size="11.5" font-weight="700" fill="#0C447C">Resources · read-only context</text>
<text x="64" y="158" font-size="10" fill="#0C447C">catalog://valid-values  (155 fields)</text>
<text x="64" y="174" font-size="10" fill="#0C447C">catalog://refcode-crosswalk  (114)</text>
<text x="64" y="190" font-size="10" fill="#0C447C">catalog://field-model · txn-apis</text>
<text x="64" y="206" font-size="10" fill="#0C447C">status://coverage</text>
<text x="64" y="224" font-size="9.5" font-style="italic" fill="#0C447C">the agent reads these for context</text>

<!-- Reference / codes (teal) -->
<rect x="327" y="118" width="255" height="116" rx="6" fill="#CCFBF1" stroke="#0D9488" stroke-width="1.3"/>
<text x="339" y="137" font-size="11.5" font-weight="700" fill="#115E59">Reference / codes</text>
<text x="339" y="158" font-size="10" fill="#115E59">resolve_codes(field)  ◀ keystone</text>
<text x="339" y="174" font-size="10" fill="#115E59">list_picklist(refList)</text>
<text x="339" y="190" font-size="10" fill="#115E59">lookup_transaction_apis()</text>
<text x="339" y="214" font-size="9.5" font-style="italic" fill="#115E59">backed by /rs/pl + crosswalk</text>

<!-- Reads (green) -->
<rect x="52" y="246" width="165" height="116" rx="6" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.3"/>
<text x="62" y="265" font-size="11.5" font-weight="700" fill="#166534">Reads</text>
<text x="62" y="284" font-size="9.5" fill="#166534">get_obligor · exposure</text>
<text x="62" y="299" font-size="9.5" fill="#166534">list/get_obligation</text>
<text x="62" y="314" font-size="9.5" fill="#166534">charges · collateral</text>
<text x="62" y="329" font-size="9.5" fill="#166534">invoices · workpackages</text>
<text x="62" y="346" font-size="9" font-style="italic" fill="#166534">+ composites:</text>
<text x="62" y="358" font-size="9" font-style="italic" fill="#166534">borrower_360 · loan_summary</text>

<!-- Origination writes (amber) -->
<rect x="237" y="246" width="165" height="116" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1.3"/>
<text x="247" y="265" font-size="11.5" font-weight="700" fill="#92400E">Origination · writes</text>
<text x="247" y="284" font-size="9.5" fill="#92400E">create_customer</text>
<text x="247" y="299" font-size="9.5" fill="#92400E">create_obligor</text>
<text x="247" y="314" font-size="9.5" fill="#92400E">reserve_number</text>
<text x="247" y="329" font-size="9.5" fill="#92400E">create_origination_wp</text>
<text x="247" y="344" font-size="9.5" fill="#92400E">advance_stage</text>
<text x="247" y="358" font-size="9.5" fill="#92400E">update_status</text>

<!-- Servicing writes (coral) -->
<rect x="422" y="246" width="160" height="116" rx="6" fill="#FFE2D9" stroke="#EA580C" stroke-width="1.3"/>
<text x="432" y="265" font-size="11.5" font-weight="700" fill="#9A3412">Servicing · writes</text>
<text x="432" y="284" font-size="9.5" fill="#9A3412">post_financial</text>
<text x="432" y="298" font-size="9" fill="#9A3412">  (simulate-first)</text>
<text x="432" y="314" font-size="9.5" fill="#9A3412">schedule_financial</text>
<text x="432" y="330" font-size="9.5" fill="#9A3412">book_loan</text>
<text x="432" y="344" font-size="9" font-style="italic" fill="#9A3412">out-of-role —</text>
<text x="432" y="355" font-size="9" font-style="italic" fill="#9A3412">labeled boundary</text>

<line x1="340" y1="374" x2="340" y2="391" stroke="#64748B" stroke-width="1.5" marker-end="url(#ah)"/>

<!-- Transport / auth (purple) -->
<rect x="40" y="392" width="560" height="40" rx="6" fill="#F3E8FF" stroke="#9333EA" stroke-width="1.3"/>
<text x="320" y="409" text-anchor="middle" font-size="11.5" font-weight="700" fill="#6B21A8">Transport &amp; Auth layer</text>
<text x="320" y="424" text-anchor="middle" font-size="9.5" fill="#6B21A8">Basic auth · Afs-AppChannel · per-request tranXref (UUID) · browser UA · ?pattern</text>
<line x1="340" y1="432" x2="340" y2="449" stroke="#64748B" stroke-width="1.5" marker-end="url(#ah)"/>

<!-- API (gray) -->
<rect x="40" y="450" width="560" height="40" rx="6" fill="#F1F5F9" stroke="#64748B" stroke-width="1.3"/>
<text x="320" y="467" text-anchor="middle" font-size="11.5" font-weight="700" fill="#334155">AFS Vision REST API — dd3.afsvision.us</text>
<text x="320" y="482" text-anchor="middle" font-size="9.5" fill="#334155">/rs/pl/*  ·  /wp/*  ·  servicing reads  ·  writes</text>
</svg>
