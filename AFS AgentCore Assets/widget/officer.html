<!doctype html>
<meta charset="utf-8" />
<!--
  AFS Officer Loan Book — Truist-branded widget. Lists the loans/workpackages attached to a
  loan officer (borrower, facility, type, amount, risk grade, status). Click a row to ask
  Claude about that loan. Fills via app.ontoolresult (structuredContent).
-->
<style>
  /*__BRAND__*/
  *{box-sizing:border-box} html,body{margin:0}
  body{font-family:var(--font);color:var(--body);background:var(--paper);font-size:13px;color-scheme:light dark}
  #root{max-width:1100px;margin:0 auto}
  .hd{display:flex;align-items:center;gap:10px;padding:12px 16px 8px}
  .hd .mark{height:22px;width:22px;flex:0 0 auto;color:var(--truist)}
  .hd h1{font-size:13px;font-weight:700;color:var(--truist);margin:0;flex:1;text-transform:uppercase;letter-spacing:.04em}
  .hd .as{font-size:10.5px;color:var(--muted);white-space:nowrap}
  .wrap{padding:4px 16px 12px}
  table{width:100%;border-collapse:collapse;font-size:11.5px}
  th,td{padding:6px 8px;text-align:right;border-bottom:1px solid var(--line);font-variant-numeric:tabular-nums;white-space:nowrap}
  th:first-child,td:first-child{text-align:left;white-space:normal}
  thead th{color:var(--muted);font-size:9.5px;text-transform:uppercase;letter-spacing:.04em;font-weight:700;border-bottom:1px solid var(--slate)}
  tbody tr{cursor:pointer}
  tbody tr:hover td{background:var(--off)}
  .bdg{display:inline-block;font-size:9px;font-weight:800;padding:1px 6px;border-radius:999px}
  .bdg.pass{background:var(--pass-bg);color:var(--pass)}
  .bdg.watch{background:var(--watch-bg);color:var(--watch)}
  .bdg.breach{background:var(--breach-bg);color:var(--breach)}
  .foot{padding:8px 16px 14px;font-size:10px;color:var(--muted);border-top:1px solid var(--line)}
  .src{color:var(--truist);font-weight:600}
  .empty{padding:26px 16px;color:var(--muted);text-align:center}
</style>
<div id="root"><div class="empty">Loading officer loan book…</div></div>
<script type="module">
/*__EXT_APPS_BUNDLE__*/
const { App } = globalThis.ExtApps;
const esc=(s)=>String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const amt=(v)=>{ const n=Number(v); if(!isFinite(n)) return esc(v); return Math.abs(n)>=1e6?`$${(n/1e6).toFixed(2)}MM`:Math.abs(n)>=1e3?`$${(n/1e3).toFixed(0)}K`:`$${n.toLocaleString()}`; };
const MARK=`<svg class="mark" viewBox="0 0 1564 1566" role="img" aria-label="Truist"><g transform="translate(0,1566) scale(0.1,-0.1)" fill="currentColor"><path d="M1156 15634 c-226 -31 -488 -133 -647 -253 -217 -164 -376 -413 -449 -704 -59 -234 -55 249 -55 -6857 0 -6207 1 -6551 18 -6656 24 -152 50 -249 102 -377 65 -162 132 -263 260 -392 164 -166 327 -260 565 -325 235 -65 -336 -60 6870 -60 5860 0 6564 2 6659 15 317 47 551 154 752 344 148 139 243 288 313 490 46 132 73 270 86 434 13 176 13 12902 0 13075 -30 391 -158 693 -386 912 -102 98 -174 150 -294 210 -160 80 -292 120 -482 145 -97 13 -948 15 -6662 14 -5444 -1 -6568 -4 -6650 -15z m13164 -4169 l0 -2875 -1985 0 -1985 0 0 1425 0 1425 -757 -2 -758 -3 0 -3605 0 -3605 758 -3 757 -2 0 1425 0 1425 1985 0 1985 0 0 -2875 0 -2875 -6500 0 -6500 0 0 2875 0 2875 1985 0 1985 0 0 -1425 0 -1425 760 0 760 0 0 3610 0 3610 -760 0 -760 0 0 -1425 0 -1425 -1985 0 -1985 0 0 2875 0 2875 6500 0 6500 0 0 -2875z"/></g></svg>`;

let DATA=null, app=null;
const ctx=()=>app?.getHostContext?.()||{};
function ask(text){ try{ app.sendMessage({role:"user",content:[{type:"text",text}]}); }catch{} }
const statusClass=(s)=>/past due/i.test(s||"")?"breach":/watch/i.test(s||"")?"watch":"pass";

function render(){
  const root=document.getElementById("root");
  if(!DATA||!Array.isArray(DATA.loans)){ root.innerHTML='<div class="empty">No loans for this officer.</div>'; return; }
  const rows=DATA.loans.map((l,i)=>`<tr data-i="${i}">
    <td>${esc(l.borrower)}</td>
    <td>${esc(l.facility||"")}</td>
    <td>${esc(l.type||"")}</td>
    <td>${amt(l.amount)}</td>
    <td>${esc(l.riskGrade||"")}</td>
    <td><span class="bdg ${statusClass(l.status)}">${esc(l.status||"")}</span></td>
  </tr>`).join("");
  root.innerHTML=`<div class="hd">${MARK}<h1>Officer Loan Book</h1><span class="as">Officer ${esc(DATA.officerId||"")} · ${DATA.count||DATA.loans.length} loans</span></div>
    <div class="wrap"><table><thead><tr><th>Borrower</th><th>Facility</th><th>Type</th><th>Amount</th><th>Risk</th><th>Status</th></tr></thead><tbody>${rows}</tbody></table></div>
    <div class="foot"><span class="src">Source: AFS (${esc(DATA.source||"")})</span> · Click a loan to ask Claude about it</div>`;
  root.querySelectorAll("tbody tr").forEach(tr=>tr.addEventListener("click",()=>{
    const l=DATA.loans[+tr.dataset.i];
    if(!l) return;
    if(l.obligation!=null) ask(`Show the loan summary for ${l.borrower} — bank ${l.bank}, obligor ${l.obligor}, obligation ${l.obligation}.`);
    else ask(`Pull up the credit memo summary for ${l.borrower} (workpackage ${l.workpackageId}).`);
  }));
}

(async()=>{
  app=new App({name:"AfsOfficerLoans",version:"1.0.0"},{availableDisplayModes:["inline","fullscreen"]},{autoResize:true});
  const theme=()=>{try{document.documentElement.classList.toggle("dark",ctx().theme==="dark")}catch{}};
  app.ontoolresult=(result)=>{ try{ DATA=result?.structuredContent ?? JSON.parse(result.content[0].text); }catch{ DATA=null; } theme(); render(); };
  app.onhostcontextchanged=()=>{ theme(); render(); };
  await app.connect();
  theme(); render();
})();
</script>
